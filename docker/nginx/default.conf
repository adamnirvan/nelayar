server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Upload size for any future file uploads.
    client_max_body_size 50m;

    # Gzip static assets.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Long-cache the hashed Vite build assets.
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Runtime-generated public files (e.g. SST/Chl raster overlays under
    # grids/{date}/) live on the shared storage volume, served directly
    # instead of through the public/storage symlink.
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        try_files $uri =404;
    }

    location ~ \.php$ {
        # "app" is the php-fpm service name in docker-compose.
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
